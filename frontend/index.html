<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <label for="fname">First Name:</label>
        <input type="text" id="fname" name="fname" placeholder="John"><br>

        <label for="lname">Last Name:</label>
        <input type="text" id="lname" name="lname" placeholder="Doe"><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="jdoe@connect.qut.edu.au"><br>

        <p>Are you a new student at QUT?</p>
        <input type="radio" id="yes" name="newstudent" value="Yes">
        <label for="yes">Yes</label><br>
        <input type="radio" id="no" name="newstudent" value="No">
        <label for="no">No</label><br>

        <p>What is your preferred delivery mode?</p>
        <input type="radio" id="online" name="delivery" value="Online">
        <label for="online">Online</label><br>
        <input type="radio" id="inperson" name="delivery" value="In-person">
        <label for="inperson">In-person</label><br><br>

        <label for="skills">List your skills:</label>
        <input type="text" id="skills" name="skills"><br>

        <p>Let us know your availability:</p>
        <input type="checkbox" id="mondayMorning" name="mondayMorning" value="tut1">
        <label for="mondayMorning"> Monday morning: 9am - 11am ONLINE</label><br>
        <input type="checkbox" id="mondayArvo" name="mondayArvo" value="tut2">
        <label for="mondayArvo"> Monday afternoon: 1pm - 4pm</label><br>
        <input type="checkbox" id="mondayEvening" name="mondayEvening" value="tut3">
        <label for="mondayEvening"> Monday evening: 6pm - 9pm ONLINE</label><br> 
        
        <input type="checkbox" id="tuesdayMorning" name="tuesdayMorning" value="tut4">
        <label for="tuesdayMorning"> Tuesday morning: 9am - 11am</label><br>
        <input type="checkbox" id="tuesdayArvo" name="tuesdayArvo" value="tut5">
        <label for="tuesdayArvo"> Tuesday afternoon: 1pm - 4pm ONLINE</label><br>
        <input type="checkbox" id="tuesdayEvening" name="tuesdayEvening" value="tut6">
        <label for="tuesdayEvening"> Tuesday evening: 6pm - 9pm</label><br>  

        <input type="checkbox" id="wednesdayMorning" name="wednesdayMorning" value="tut4">
        <label for="wednesdayMorning"> Wednesday morning: 9am - 11am</label><br>
        <input type="checkbox" id="wednesdayArvo" name="wednesdayArvo" value="tut5">
        <label for="wednesdayArvo"> Wednesday afternoon: 1pm - 4pm</label><br>
        <input type="checkbox" id="wednesdayEvening" name="wednesdayEvening" value="tut6">
        <label for="wednesdayEvening"> Wednesday evening: 6pm - 9pm ONLINE</label><br>
        
        <input type="checkbox" id="thursdayMorning" name="thursdayMorning" value="tut4">
        <label for="thursdayMorning"> Thursday morning: 9am - 11am ONLINE</label><br>
        <input type="checkbox" id="thursdayArvo" name="thursdayArvo" value="tut5">
        <label for="thursdayArvo"> Thursday afternoon: 1pm - 4pm</label><br>
        <input type="checkbox" id="thursdayEvening" name="thursdayEvening" value="tut6">
        <label for="thursdayEvening"> Thursday evening: 6pm - 9pm</label><br> 
        
        <input type="checkbox" id="FridayMorning" name="FridayMorning" value="tut4">
        <label for="FridayMorning"> Friday morning: 9am - 11am</label><br>
        <input type="checkbox" id="FridayArvo" name="FridayArvo" value="tut5">
        <label for="FridayArvo"> Friday afternoon: 1pm - 4pm</label><br>
        <input type="checkbox" id="FridayEvening" name="FridayEvening" value="tut6">
        <label for="FridayEvening"> Friday evening: 6pm - 9pm ONLINE</label><br><br>  

        <label for="preferencecode">Team Preference Code:</label><br>
        <input type="text" id="preferencecode" name="preferencecode"><br><br>

        <input type="submit" value="Submit">
        <input type="reset" value="Reset">


    </form>
</body>
</html>
